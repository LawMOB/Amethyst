name: Development Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Set up JDK 8 (Azul Zulu for Apple Silicon)
      uses: actions/setup-java@v4
      id: setup-java
      with:
        java-version: '8'
        distribution: 'zulu'

    - name: Install System Dependencies
      run: |
        # Install standard build utility systems required by the project
        brew install automake autoconf libtool ldid wget

    - name: Run Project Makefile
      run: |
        # 1. Capture the exact base folder path of the installed JDK 8
        JDK_BASE_PATH="${{ steps.setup-java.outputs.path }}"
        
        # 2. Add Java's bin directory directly into the global system PATH
        export PATH="$JDK_BASE_PATH/bin:$PATH"
        
        # 3. Trigger make while manually feeding BOTH target tracking variables
        make JAVA_HOME="$JDK_BASE_PATH" BOOTJDK="$JDK_BASE_PATH/bin"

    - name: Cache Build Dependencies
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj') }}

    - name: Find Scheme and Build Xcode Project
      run: |
        JDK_BASE_PATH="${{ steps.setup-java.outputs.path }}"
        SCHEME_NAME=$(xcodebuild -project Amethyst.xcodeproj -list | awk '/Schemes:/{flag=1;next} /^$/{flag=0} flag' | sed 's/^[[:space:]]*//' | head -n 1)
        echo "Detected Scheme Name: '$SCHEME_NAME'"
        
        if [ -z "$SCHEME_NAME" ]; then
          echo "Error: Could not automatically detect an Xcode scheme!"
          exit 1
        fi
        
        echo "TARGET_SCHEME=$SCHEME_NAME" >> $GITHUB_ENV
        
        xcodebuild -project Amethyst.xcodeproj \
                   -scheme "$SCHEME_NAME" \
                   -configuration Release \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   JAVA_HOME="$JDK_BASE_PATH" \
                   BOOTJDK="$JDK_BASE_PATH/bin" \
                   clean build

    - name: Package App into IPA
      run: |
        mkdir -p Payload
        cp -r ~/Library/Developer/Xcode/DerivedData/Amethyst-*/Build/Products/Release-iphoneos/*.app Payload/
        zip -r Amethyst.ipa Payload

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: Amethyst-iOS-Build
        path: Amethyst.ipa
